name: Create SBOM
on:
  workflow_call:
    inputs:
      image:
        description: full image reference to scan
        required: true
        type: string
      artifact-name:
        description: name for the uploaded SBOM artifact
        required: true
        type: string
      registry:
        description: registry to authenticate against before scanning (optional)
        required: false
        type: string
        default: ''
      image-artifact:
        description: name of the uploaded image OCI-archive artifact to scan locally
        required: false
        type: string
        default: ''
    secrets:
      registry-token:
        description: token for registry authentication
        required: false
      registry-username:
        description: username for registry authentication
        required: false
permissions: {}
jobs:
  create-sbom:
    runs-on: ubuntu-24.04
    steps:
      - name: Login to Registry
        if: ${{ inputs.registry != '' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username != '' && secrets.registry-username || github.repository_owner }}
          password: ${{ secrets.registry-token }}
      - name: Create SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.image }}
          format: 'cyclonedx'
          output: 'result.json'
          skip-dirs: '/usr/share/dynatrace-operator/third_party_licenses'
          skip-files: '/usr/local/bin/dynatrace-operator'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: result.json
          retention-days: 1

  create-sbom-local:
    runs-on: ubuntu-24.04
    steps:
      - name: Download image artifact
        if: ${{ inputs.image-artifact != '' }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.image-artifact }}
          path: image
      - name: dbg
        shell: bash
        run: |
          echo "image tar: $(tar -tvf image/image-oci.tar)"
      - name: Create SBOM
        if: ${{ inputs.image-artifact != '' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: image/image-oci.tar
          format: 'cyclonedx'
          output: 'result.json'
          skip-dirs: '/usr/share/dynatrace-operator/third_party_licenses'
          skip-files: '/usr/local/bin/dynatrace-operator'
      - name: Upload SBOM artifact
        if: ${{ inputs.image-artifact != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}-local
          path: result.json
          retention-days: 1
